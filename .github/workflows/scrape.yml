name: Arctic Defense Opportunity Scraper

on:
  schedule:
    # Run at 6 AM and 6 PM ET (11:00 and 23:00 UTC)
    - cron: '0 11 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      skip_llm:
        description: 'Skip LLM filtering (faster, for testing)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: scrape-and-pages
  cancel-in-progress: false

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Install Playwright browsers
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Create data directories
        run: |
          mkdir -p data/debug

      - name: Run scraper
        env:
          SAM_GOV_API_KEY: ${{ secrets.SAM_GOV_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SKIP_LLM: ${{ github.event.inputs.skip_llm || 'false' }}
        run: |
          python -m scraper.main

      - name: Copy data to dashboard for Pages
        run: |
          cp data/opportunities.json dashboard/data.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
