<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arctic Defense Opportunities</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Arctic Defense Opportunities</h1>
            <p class="subtitle">Defense solicitations filtered for arctic and cold-region relevance</p>
        </div>
    </header>

    <main>
        <div class="stats-bar" id="stats-bar">
            <div class="stat">
                <span class="stat-value" id="total-count">-</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="open-count">-</span>
                <span class="stat-label">Open</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="closing-soon-count">-</span>
                <span class="stat-label">Closing Soon</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="high-relevance-count">-</span>
                <span class="stat-label">High Relevance</span>
            </div>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search opportunities...">
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label>Source</label>
                    <select id="source-filter">
                        <option value="">All Sources</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Type</label>
                    <select id="type-filter">
                        <option value="">All Types</option>
                        <option value="SBIR">SBIR</option>
                        <option value="STTR">STTR</option>
                        <option value="BAA">BAA</option>
                        <option value="CSO">CSO</option>
                        <option value="OTA">OTA</option>
                        <option value="RFP">RFP</option>
                        <option value="RFI">RFI</option>
                        <option value="Grant">Grant</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Status</label>
                    <select id="status-filter">
                        <option value="">All Status</option>
                        <option value="Open">Open</option>
                        <option value="Forecasted">Forecasted</option>
                        <option value="Closed">Closed</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Min Relevance: <span id="relevance-value">0.3</span></label>
                    <input type="range" id="relevance-filter" min="0" max="1" step="0.1" value="0.3">
                </div>

                <div class="filter-group">
                    <label>Sort By</label>
                    <select id="sort-select">
                        <option value="relevance">Arctic Relevance</option>
                        <option value="close_date">Close Date (Soonest)</option>
                        <option value="posted_date">Posted Date (Newest)</option>
                        <option value="title">Title (A-Z)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="opportunities-container" id="opportunities-container">
            <div class="loading">Loading opportunities...</div>
        </div>
    </main>

    <div class="modal" id="detail-modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <footer>
        <p>Data updated automatically twice daily. 
           <a href="https://github.com" target="_blank">View on GitHub</a>
        </p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
